<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Lab — тестирование запросов</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-soft: #202431;
      --text: #eef1f6;
      --muted: #9ba3b4;
      --primary: #7b9cff;
      --accent: #22d3aa;
      --danger: #ff6b6b;
      --line: #2a3040;
      --radius: 16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 20% 0%, #1b2030 0%, var(--bg) 42%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 18px;
    }

    .card {
      background: color-mix(in srgb, var(--panel) 88%, #000);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .3);
    }

    .sidebar { padding: 18px; }
    .app-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
      letter-spacing: .2px;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .preset-list { margin-top: 18px; display: grid; gap: 10px; }
    .preset {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      width: 100%;
      text-align: left;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: .2s ease;
    }
    .preset:hover { border-color: var(--primary); transform: translateY(-1px); }
    .preset strong { display: block; font-size: 13px; }
    .preset span { color: var(--muted); font-size: 12px; }

    .main { padding: 18px; }
    .row { display: flex; gap: 10px; margin-bottom: 12px; }
    input, select, textarea {
      width: 100%;
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }
    textarea { min-height: 140px; resize: vertical; font-family: var(--mono); }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }

    .method { width: 130px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      color: white;
      background: var(--primary);
      cursor: pointer;
      font-weight: 600;
    }
    .btn.secondary { background: #384056; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .result {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }
    .result-head {
      background: #131722;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      font-size: 13px;
    }
    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      background: #2b3347;
      color: var(--text);
    }
    .badge.ok { background: rgba(34, 211, 170, .18); color: var(--accent); }
    .badge.fail { background: rgba(255, 107, 107, .16); color: var(--danger); }

    pre {
      margin: 0;
      padding: 14px;
      max-height: 360px;
      overflow: auto;
      background: #10131b;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.55;
    }

    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="card sidebar">
      <h1 class="app-title">API Lab</h1>
      <p class="subtitle">
        Минималистичный инструмент для тестирования API, webhook и произвольных HTTP-запросов через серверную часть.
      </p>
      <div class="preset-list">
        <button class="preset" data-preset="health">
          <strong>GET /api/health</strong>
          <span>Проверка доступности серверной части.</span>
        </button>
        <button class="preset" data-preset="echo">
          <strong>POST /api/echo</strong>
          <span>Проверка тела и заголовков запроса.</span>
        </button>
        <button class="preset" data-preset="proxy">
          <strong>POST /api/proxy</strong>
          <span>Запрос к внешнему API через бэкенд.</span>
        </button>
      </div>
    </aside>

    <main class="card main">
      <div class="row">
        <select id="method" class="method">
          <option>GET</option>
          <option>POST</option>
          <option>PUT</option>
          <option>PATCH</option>
          <option>DELETE</option>
          <option>HEAD</option>
        </select>
        <input id="url" placeholder="https://api.example.com/resource" />
      </div>

      <div class="row">
        <textarea id="headers" placeholder='Заголовки JSON, например: {"Authorization":"Bearer token"}'></textarea>
      </div>
      <div class="row">
        <textarea id="body" placeholder='Тело запроса (текст или JSON)'></textarea>
      </div>

      <div class="toolbar">
        <div>
          <button id="sendBtn" class="btn">Отправить запрос</button>
          <button id="formatBtn" class="btn secondary">Форматировать JSON</button>
        </div>
        <div class="status" id="status">Готово к работе</div>
      </div>

      <section class="result">
        <div class="result-head">
          <strong>Ответ сервера</strong>
          <span id="codeBadge" class="badge">—</span>
        </div>
        <pre id="output">{
  "hint": "Выберите шаблон слева или введите URL и отправьте запрос"
}</pre>
      </section>
    </main>
  </div>

  <script>
    const el = {
      method: document.getElementById('method'),
      url: document.getElementById('url'),
      headers: document.getElementById('headers'),
      body: document.getElementById('body'),
      sendBtn: document.getElementById('sendBtn'),
      formatBtn: document.getElementById('formatBtn'),
      output: document.getElementById('output'),
      codeBadge: document.getElementById('codeBadge'),
      status: document.getElementById('status'),
    };

    const presets = {
      health: {
        method: 'GET',
        url: '/api/health',
        headers: '{}',
        body: ''
      },
      echo: {
        method: 'POST',
        url: '/api/echo',
        headers: '{\n  "Content-Type": "application/json"\n}',
        body: '{\n  "message": "Тест API",\n  "timestamp": "' + new Date().toISOString() + '"\n}'
      },
      proxy: {
        method: 'POST',
        url: '/api/proxy',
        headers: '{\n  "Content-Type": "application/json"\n}',
        body: '{\n  "url": "https://httpbin.org/anything",\n  "method": "GET",\n  "headers": {\n    "Accept": "application/json"\n  }\n}'
      }
    };

    function setStatus(text) {
      el.status.textContent = text;
    }

    function setBadge(code, ok) {
      el.codeBadge.textContent = code || '—';
      el.codeBadge.className = 'badge ' + (ok ? 'ok' : code ? 'fail' : '');
    }

    function pretty(raw) {
      try {
        return JSON.stringify(JSON.parse(raw), null, 2);
      } catch {
        return raw;
      }
    }

    document.querySelectorAll('.preset').forEach((btn) => {
      btn.addEventListener('click', () => {
        const preset = presets[btn.dataset.preset];
        el.method.value = preset.method;
        el.url.value = preset.url;
        el.headers.value = preset.headers;
        el.body.value = preset.body;
        setStatus('Шаблон загружен');
      });
    });

    el.formatBtn.addEventListener('click', () => {
      el.headers.value = pretty(el.headers.value.trim() || '{}');
      if (el.body.value.trim()) {
        el.body.value = pretty(el.body.value);
      }
      setStatus('JSON отформатирован');
    });

    el.sendBtn.addEventListener('click', async () => {
      const targetUrl = el.url.value.trim();
      if (!targetUrl) {
        setStatus('Укажите URL запроса');
        return;
      }

      let headers;
      try {
        headers = JSON.parse(el.headers.value.trim() || '{}');
      } catch {
        setStatus('Ошибка: headers должен быть валидным JSON');
        return;
      }

      const start = performance.now();
      el.sendBtn.disabled = true;
      setStatus('Выполняется запрос...');
      setBadge('', false);

      try {
        const res = await fetch(targetUrl, {
          method: el.method.value,
          headers,
          body: ['GET', 'HEAD'].includes(el.method.value) ? undefined : el.body.value,
        });

        const text = await res.text();
        const ms = Math.round(performance.now() - start);
        setBadge(String(res.status), res.ok);
        setStatus(`Готово за ${ms} мс`);
        el.output.textContent = pretty(text);
      } catch (error) {
        setBadge('ERR', false);
        setStatus('Ошибка сети или CORS');
        el.output.textContent = JSON.stringify({ error: error.message }, null, 2);
      } finally {
        el.sendBtn.disabled = false;
      }
    });

    document.querySelector('[data-preset="health"]').click();
  </script>
</body>
</html>
